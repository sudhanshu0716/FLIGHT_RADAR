name: Flight Status Monitor

on:
  schedule:
    # Runs automatically every 10 minutes to check if flights have taken off
    - cron: '*/10 * * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  monitor_flights:
    runs-on: ubuntu-latest
    steps:
      - name: Check Sudhanshu's Flight (6E941)
        run: |
          echo "Checking if Sudhanshu's flight (IndiGo 6E941) is currently airborne..."
          # Uses a stealth User-Agent to prevent Cloudflare from blocking the request
          STATUS=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "https://api.flightradar24.com/common/v1/flight/list.json?query=6E941")
          
          if [[ "$STATUS" == *"\"live\""* ]]; then
            echo "🟢 LIVE: Sudhanshu's flight is currently in the air!"
          else
            echo "🔴 NOT STARTED: Sudhanshu's flight is parked or hasn't started yet."
          fi

      - name: Check Priyansh's Flight (6E6477)
        run: |
          echo "Checking if Priyansh's flight (IndiGo 6E6477) is currently airborne..."
          STATUS=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "https://api.flightradar24.com/common/v1/flight/list.json?query=6E6477")
          
          if [[ "$STATUS" == *"\"live\""* ]]; then
            echo "🟢 LIVE: Priyansh's flight is currently in the air!"
          else
            echo "🔴 NOT STARTED: Priyansh's flight is parked or hasn't started yet."
          fi

      - name: Trigger WhatsApp Tracker Alerts
        run: |
          echo "Pinging backend to trigger location-based WhatsApp messages via Twilio..."
          curl -s "https://flight-radar-gkl4.onrender.com/cron/whatsapp-check" || echo "Ping completed."
